<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Exemplo de Formulario</h1>
    <form action="cadastro.php" method="get">
      <fieldset>
        <legend>Dados pessoais</legend>
          <p>
            <label for="inome">Nome</label>
            <input type="text" name="Nome" id="inome" maxlength="5" required>
        </p>
        <p>
            <label for="iemal">E-email</label>
            <input type="email" name="E-email" id="iemal">
        </p>
        <p>
            <label for="itel">Telefone</label>
            <input type="tel" name="Telefone" id="itel" autocomplete="tel" required pattern="^[0-9]{4}-[0-9]{4}$"
        </p>
        <p>
            <input type="submit" value="Emviar">
            <input type="reset" value="limpar">
        </p>
      </fieldset>
        
    </form>
    
</body>
</html>
