<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Teste de formularios</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <p>
            <label for="iusuario">usuario</label>
            <input type="text" name="usuario" id="iusuario" required minlength="5" maxlength="8" size="8" placeholder="Nome do usuario" autocomplete="username">
        </p>
        <p>
            <label for="isenha">senha</label>
            <input type="password" name="senha" id="isenha" required minlength="3" maxlength="5" size="8" placeholder="senha" autocomplete="current-password">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="limpar">
        </p>

    </form>
</body>
</html>
