<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Teste de Formulario</h1>
    <form action="cadastro.php"  method="get" autocomplete="on">
    <p>
        <label for="inome">nome:</label>
        <input type="text" name="nome" id="inome" required maxlength="30" autocomplete="name" placeholder="nome compleito">
    </p>
    <p>
        <label for="imedia">Media</label>
        <input type="number" name="Media" id="imedia" min="o" max="10" placeholder="0 a 10" step="0.5">
    </p>
    <p>
        <label for="imes">Mes</label>
        <input type="month" name="Mes" id="imes">
    </p>
    <p>
        <label for="idia">Dia da prova</label>
        <input type="date" name="Dia" id="idia">
    </p>
    <p>
     <label for="ihora">Horario da prova </label>
     <input type="time" name="Horario" id="ihora">
    </p>
    <p>
        <input type="submit" value="enviar">
        <input type="reset" value="limpar">
    </p>



    </form>
    
</body>
</html>
