<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        td{
            border: 1px solid black;
            padding: 10px;
        }
        table{
            border-collapse: collapse;
            text-align: center;
            width: 400px;
            height: 400px;
        }
    </style>
</head>
<body>
    <h1>Tabela de Exemplo</h1>
    <table>
        <tr>
            <td colspan="3">A</td>
            <td>b</td>
        </tr>
        <tr>
            <td rowspan="4">c</td>
            <td>f</td>
            <td>g</td>
            <td rowspan="3">h</td>
            
        </tr>
        <tr>
            
            <td>j</td>
            <td>k</td>
        
        </tr>
        <tr>
            
            <td>n</td>
            <td>o</td>
            
        </tr>
        <tr>
        
            
            <td colspan="4">n</td>
            

        

        </tr>
    </table>
    
</body>
</html>
